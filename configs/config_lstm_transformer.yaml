# configs/config_lstm_transformer.yaml
# 针对高算力环境的优化配置 (High-Performance Setup)

experiment:
  name: "SOC_LSTM_Transformer_HPC_v2"
  seed: 42
  device: "cuda" # 自动检测 GPU

data:
  # 【关键】大幅增加序列长度，利用 Transformer 的长程依赖能力
  train_path: "data/processed/lstm_400_data.npz" # 确保路径正确

  seq_length: 400 
  pred_length: 1   # 单步预测
  batch_size: 256  # 大 Batch 稳定梯度
  num_workers: 8   # 多进程加载数据，避免 CPU 瓶颈
  use_amp: true    # 启用自动混合精度 (Automatic Mixed Precision)
  
  # 数据增强 (防止大模型过拟合)
  augmentation:
    enabled: true
    noise_std: 0.005  # 添加微小高斯噪声
    dropout_prob: 0.1 # 随机丢弃部分时间步 (Time Dropout)

model:
  # 扩大模型容量
  d_model: 256        # 特征维度翻倍
  n_heads: 16         # 注意力头数增加
  transformer_layers: 6 # 加深 Transformer 层数
  lstm_layers: 2      # LSTM 保持适中，主要做局部特征提取
  d_ff: 1024          # FeedForward 维度扩大 (通常是 d_model 的 4 倍)
  dropout: 0.2        # 适当增加 Dropout 应对大模型
  activation: "gelu"  # GELU 比 ReLU 在 Transformer 中表现更好
  
  # 架构选项
  use_gated_fusion: true  # 启用门控融合机制
  use_residual: true      # 必须启用残差以支持深层网络

training:
  epochs: 100         # 增加 epoch，大模型需要更多迭代收敛
  optimizer: "AdamW"  # AdamW 比 Adam 更适合 Transformer (权重衰减分离)
  
  # 学习率设置 (大 Batch + 大模型需要调整 LR)
  base_lr: 0.0005     # 初始学习率
  min_lr: 1e-6        # 最小学习率
  
  # 高级调度策略
  scheduler:
    type: "CosineAnnealingWarmRestarts"
    T_0: 30           # 第一个重启周期
    T_mult: 2         # 周期倍增
    warmup_epochs: 10 # 【重要】前 10 个 epoch 线性预热，防止大模型崩溃

  # 损失函数
  loss_function: "mse" # 对异常值更鲁棒
  huber_delta: 1.0

  # 早停策略 (虽然算力好，但仍需防止过拟合)
  early_stopping:
    enabled: true
    patience: 60      # 给足耐心，大模型收敛慢
    min_delta: 0.0001

logging:
  log_dir: "runs/logs"       # <--- 必须添加这一行！定义日志根目录
  level: "INFO"
  save_checkpoint: true
  tensorboard: true
  save_every_epochs: 20
  plot_interval: 10

evaluation:
  save_predictions: true
