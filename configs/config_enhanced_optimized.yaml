data_processing:
  feature_cols:
  - speed
  - mileage
  - total_volt
  - total_current
  - max_cell_volt
  - min_cell_volt
  - max_temp
  - min_temp
  - temperature_c
  - relative_humidity
  - visibility_km
  - wind_speed_ms
  input_file: data/aligned/aligned_data_refined_soc.csv
  label_col: refined_soc
  max_time_gap: 3600
  sequence_length: 40
  split:
    test: 0.15
    validation: 0.15
  stride: 20
  time_col: DATE
enhanced_processing:
  context_size: 2
  continuity_detection: true
  enabled: true
  min_segment_length: 44
experiment_name: lstm_enhanced_full
feature_engineering:
  acceleration:
    max_acceleration: 10.0
    min_time_diff: 0.1
  base_features:
  - speed
  - total_volt
  - total_current
  - refined_soc
  - mileage
  - max_temp
  - min_temp
  - max_cell_volt
  - min_cell_volt
  - temperature_c
  - relative_humidity
  - visibility_km
  - wind_speed_ms
  enabled: true
  feature_types:
    boundary_features: true
    point_features: true
    sequence_features: true
  power:
    consider_charging: false
  speed_clustering:
    enabled: false
    n_clusters: 3
    quantiles:
    - 0.33
    - 0.67
    use_quantiles: true
model:
  hidden_size: 128
  input_size: null
  num_layers: 3
  output_size: 1
paths:
  csv_save_name: lstm_enhanced_full_predictions_detail.csv
  log_dir: logs
  model_save_name: best_lstm_enhanced_full_model.pth
  plot_save_name: lstm_enhanced_full_prediction_scatter.png
  processed_data_file: lstm_enhanced_full_data.npz
  processed_scaler_file: lstm_enhanced_full_scalers.pkl
processing_mode: enhanced
training:
  batch_size: 32
  epochs: 108
  learning_rate: 0.0001
  loss_function: mae
  optimizer: adam
  patience: 30
  scheduler:
    factor: 0.5
    patience: 5
    type: ReduceLROnPlateau
