# configs/config_with_features.yaml
experiment_name: lstm_with_features_400s

data_processing:
  input_file: aligned_data_refined_soc.csv
  sequence_length: 40  # 400s / 10s
  stride: 20
  max_time_gap: 500
  time_col: DATE
  label_col: refined_soc
  feature_cols:
    - speed
    - mileage
    - total_volt
    - total_current
    - max_cell_volt
    - min_cell_volt
    - max_temp
    - min_temp
    - temperature_c
    - relative_humidity
    - visibility_km
    - wind_speed_ms
  split:
    validation: 0.15
    test: 0.15

feature_engineering:
  enabled: true
  base_features:
    - speed
    - total_volt
    - total_current
    - refined_soc
    - mileage
    - max_temp
    - min_temp
    - max_cell_volt
    - min_cell_volt
    - temperature_c
    - relative_humidity
    - visibility_km
    - wind_speed_ms
  derived_features:
    - avg_acceleration
    - speed_category
    - distance_traveled
    - low_speed_ratio
    - medium_speed_ratio
    - high_speed_ratio
    - cruising_ratio
    - instant_power
    - total_energy
  speed_thresholds:
    low: 20    # 自动确定
    medium: 60

model:
  input_size: 22  # 13 base + 9 derived (注意：文档中是12+7=19，但这里base_features有13个)
  hidden_size: 128
  num_layers: 3
  output_size: 1  # 单输出，多输出时需要修改

training:
  optimizer: adam
  learning_rate: 0.0001
  batch_size: 32
  epochs: 108
  patience: 30
  loss_function: mae
  scheduler:
    type: ReduceLROnPlateau
    factor: 0.5
    patience: 5

paths:
  processed_data_file: lstm_with_features_400s_data.npz
  processed_scaler_file: lstm_with_features_400s_scalers.pkl
  model_save_name: best_lstm_with_features_400s_model.pth
  plot_save_name: lstm_with_features_400s_prediction_scatter.png
  csv_save_name: lstm_with_features_400s_predictions_detail.csv
  log_dir: logs
