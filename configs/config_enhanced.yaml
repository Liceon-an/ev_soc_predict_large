# configs/config_enhanced.yaml
# 新架构配置文件
experiment_name: lstm_enhanced_400s

# 处理模式选择
processing_mode: enhanced  # enhanced 或 legacy

data_processing:
  input_file: aligned_data_refined_soc.csv
  sequence_length: 40  # 核心序列长度 400s / 10s
  stride: 20
  max_time_gap: 500
  time_col: DATE
  label_col: refined_soc
  feature_cols:
    - speed
    - mileage
    - total_volt
    - total_current
    - max_cell_volt
    - min_cell_volt
    - max_temp
    - min_temp
    - temperature_c
    - relative_humidity
    - visibility_km
    - wind_speed_ms
  split:
    validation: 0.15
    test: 0.15

# 新架构特有配置
enhanced_processing:
  enabled: true
  context_size: 2  # 前后上下文大小
  min_segment_length: 44  # 最小连续段长度 (40 + 2*2)
  continuity_detection: true

feature_engineering:
  enabled: true
  base_features:
    - speed
    - total_volt
    - total_current
    - refined_soc
    - mileage
    - max_temp
    - min_temp
    - max_cell_volt
    - min_cell_volt
    - temperature_c
    - relative_humidity
    - visibility_km
    - wind_speed_ms

  # 特征类型开关
  feature_types:
    point_features: true  # 单点特征
    sequence_features: true  # 序列级特征
    boundary_features: true  # 边界特征

  # 速度聚类配置
  speed_clustering:
    enabled: true
    n_clusters: 3
    cluster_names: ["low", "medium", "high"]

  # 加速度计算配置
  acceleration:
    min_time_diff: 0.1
    max_acceleration: 10.0

  # 功率计算配置
  power:
    consider_charging: false  # 是否考虑充电

model:
  input_size: null  # 运行时自动计算
  hidden_size: 128
  num_layers: 3
  output_size: 1  # 单输出，多输出时需要修改

training:
  optimizer: adam
  learning_rate: 0.0001
  batch_size: 32
  epochs: 108
  patience: 30
  loss_function: mae
  scheduler:
    type: ReduceLROnPlateau
    factor: 0.5
    patience: 5

paths:
  processed_data_file: lstm_enhanced_400s_data.npz
  processed_scaler_file: lstm_enhanced_400s_scalers.pkl
  model_save_name: best_lstm_enhanced_400s_model.pth
  plot_save_name: lstm_enhanced_400s_prediction_scatter.png
  csv_save_name: lstm_enhanced_400s_predictions_detail.csv
  log_dir: logs